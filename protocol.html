    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('userEmail');
            if (!email) {
                // If not logged in, redirect to signup
                window.location.href = 'signup.html';
                return;
            }

            // Check if protocol details are already filled (details are fixed and cannot be changed)
            fetch(`/api/user/protocol?email=${encodeURIComponent(email)}`)
                .then(res => res.json())
                .then(data => {
                    const proto = data.protocol || {};
                    if (proto.age && proto.height && proto.weight && proto.biologicalSex) {
                        window.location.href = 'dashboard.html';
                    }
                })
                .catch(err => console.error("Error validating protocol status:", err));

            const steps = [
                document.getElementById('step-1'),
                document.getElementById('step-2'),
                document.getElementById('step-3')
            ];
            
            const labels = [
                document.getElementById('step-label-1'),
                document.getElementById('step-label-2'),
                document.getElementById('step-label-3')
            ];

            const btnNext = document.getElementById('btn-next');
            const btnBack = document.getElementById('btn-back');
            const progressIndicator = document.getElementById('progress-indicator');
            
            let currentStep = 0;

            function updateUI() {
                // Update Steps visibility
                steps.forEach((step, index) => {
                    if (index === currentStep) {
                        step.classList.add('active');
                        step.style.display = 'block';
                        setTimeout(() => {
                            step.style.opacity = '1';
                        }, 50);
                    } else {
                        step.classList.remove('active');
                        step.style.display = 'none';
                        step.style.opacity = '0';
                    }
                });

                // Update Progress Bar (33%, 66%, 100%)
                const progressPercentage = ((currentStep + 1) / steps.length) * 100;
                progressIndicator.style.width = `${progressPercentage}%`;

                // Update Labels
                labels.forEach((label, index) => {
                    if (index <= currentStep) {
                        label.classList.add('text-primary');
                        label.classList.remove('text-on-surface-variant');
                    } else {
                        label.classList.remove('text-primary');
                        label.classList.add('text-on-surface-variant');
                    }
                });

                // Update Buttons
                if (currentStep === 0) {
                    btnBack.classList.add('invisible');
                } else {
                    btnBack.classList.remove('invisible');
                }

                if (currentStep === steps.length - 1) {
                    btnNext.innerHTML = `Complete <span class="material-symbols-outlined text-[18px]">check</span>`;
                } else {
                    btnNext.innerHTML = `Next <span class="material-symbols-outlined text-[18px]">arrow_forward</span>`;
                }
            }

            function validateStep(stepIndex) {
                const errorDisplay = document.getElementById('error-display');
                const errorText = document.getElementById('error-text');

                function showError(msg) {
                    errorText.textContent = msg;
                    errorDisplay.classList.remove('hidden');
                    errorDisplay.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }

                if (stepIndex === 0) {
                    const age = document.getElementById('age').value;
                    const biologicalSex = document.getElementById('gender').value;
                    const height = document.getElementById('height').value;
                    const weight = document.getElementById('weight').value;

                    if (!age || !biologicalSex || !height || !weight) {
                        showError("Please enter all physical metrics (Age, Sex, Height, and Weight) to proceed.");
                        return false;
                    }
                    if (Number(age) <= 0 || Number(height) <= 0 || Number(weight) <= 0) {
                        showError("Please enter valid positive numbers for Age, Height, and Weight.");
                        return false;
                    }
                } else if (stepIndex === 1) {
                    const occupation = document.getElementById('occupation').value.trim();
                    const activityLevel = document.querySelector('input[name="activity_level"]:checked')?.value;

                    if (!occupation) {
                        showError("Please enter your primary occupation.");
                        return false;
                    }
                    if (!activityLevel) {
                        showError("Please select your daily activity level.");
                        return false;
                    }
                } else if (stepIndex === 2) {
                    const goals = Array.from(document.querySelectorAll('.goal-checkbox:checked'));
                    if (goals.length === 0) {
                        showError("Please select at least one health or performance goal.");
                        return false;
                    }
                }
                return true;
            }

            btnNext.addEventListener('click', () => {
                // Clear any previous error
                const errorDisplay = document.getElementById('error-display');
                const errorText = document.getElementById('error-text');
                errorDisplay.classList.add('hidden');

                if (!validateStep(currentStep)) {
                    return;
                }

                if (currentStep < steps.length - 1) {
                    currentStep++;
                    updateUI();
                } else {
                    // Disable next button and show loading spinner
                    btnNext.disabled = true;
                    btnNext.innerHTML = `<span class="material-symbols-outlined animate-spin text-[18px]">sync</span>`;
                    
                    // Collect telemetry data
                    const age = document.getElementById('age').value;
                    const biologicalSex = document.getElementById('gender').value;
                    const height = document.getElementById('height').value;
                    const weight = document.getElementById('weight').value;
                    const occupation = document.getElementById('occupation').value;
                    const activityLevel = document.querySelector('input[name="activity_level"]:checked')?.value;
                    const goals = Array.from(document.querySelectorAll('.goal-checkbox:checked')).map(cb => cb.value);

                    // Send POST request to backend API
                    fetch('/api/user/protocol', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email,
                            age,
                            biologicalSex,
                            height,
                            weight,
                            occupation,
                            activityLevel,
                            goals
                        })
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Failed to save protocol telemetry.');
                        }
                        return response.json();
                    })
                    .then(data => {
                        // Save protocol telemetry in localStorage
                        localStorage.setItem('userProtocol', JSON.stringify({
                            age,
                            biologicalSex,
                            height,
                            weight,
                            occupation,
                            activityLevel,
                            goals
                        }));
                        // Display success and redirect to dashboard
                        btnNext.innerHTML = `Initialized <span class="material-symbols-outlined text-[18px]">check</span>`;
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    })
                    .catch(err => {
                        console.error('Error saving telemetry baseline:', err);
                        btnNext.disabled = false;
                        btnNext.innerHTML = `Complete <span class="material-symbols-outlined text-[18px]">check</span>`;
                        
                        errorText.textContent = 'Failed to connect to backend server. Telemetry calibration failed.';
                        errorDisplay.classList.remove('hidden');
                    });
                }
            });

            btnBack.addEventListener('click', () => {
                // Clear errors on back navigation
                const errorDisplay = document.getElementById('error-display');
                errorDisplay.classList.add('hidden');

                if (currentStep > 0) {
                    currentStep--;
                    updateUI();
                }
            });
            
            // Initial call to set up the correct displays
            updateUI();
        });
    </script>



</body></html>
